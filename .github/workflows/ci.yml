name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: rust ${{ matrix.job }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        if: matrix.job == 'fmt'
        run: cargo fmt --all -- --check
      - name: cargo clippy
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        if: matrix.job == 'test'
        run: cargo test --workspace --all-features

  web:
    name: web (vite 8 + tanstack)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - run: bun test
        continue-on-error: true # no tests yet; don't fail CI in phase 0
